<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WebLinkScanner - Account Approval</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      max-width: 480px;
      width: 90%;
      overflow: hidden;
      text-align: center;
    }
    .header {
      background: #1d4ed8;
      color: #fff;
      padding: 28px 32px;
    }
    .header .logo { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
    .header .sub  { font-size: 14px; opacity: 0.85; }
    .body { padding: 28px 32px; }
    .info-box {
      background: #f8fafc;
      border-radius: 12px;
      padding: 16px 20px;
      margin: 18px 0;
      text-align: left;
    }
    .info-row {
      display: flex;
      padding: 8px 0;
      border-bottom: 1px solid #e2e8f0;
      font-size: 14px;
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { width: 70px; color: #64748b; }
    .info-value { font-weight: 600; color: #0f172a; }
    .info-value.role { color: #1d4ed8; }
    .btn-row { display: flex; gap: 12px; margin-top: 20px; }
    .btn {
      flex: 1;
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
    }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-approve { background: #16a34a; }
    .btn-reject  { background: #dc2626; }
    .result { padding: 40px 32px; }
    .icon   { font-size: 52px; margin-bottom: 14px; }
    h1      { font-size: 22px; color: #0f172a; margin-bottom: 10px; }
    p       { font-size: 15px; color: #64748b; line-height: 1.6; }
    .badge  {
      display: inline-block;
      border-radius: 8px;
      padding: 4px 14px;
      font-size: 13px;
      font-weight: 600;
      margin: 10px 0;
    }
    .footer { padding: 14px; font-size: 12px; color: #94a3b8; background: #f8fafc; }
    .spinner {
      border: 3px solid #e2e8f0;
      border-top: 3px solid #1d4ed8;
      border-radius: 50%;
      width: 36px; height: 36px;
      animation: spin 0.8s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="logo">&#128279; WebLinkScanner</div>
    <div class="sub" id="header-sub">Admin Approval Required</div>
  </div>
  <div id="content">
    <div class="result"><div class="spinner"></div><p>Loading...</p></div>
  </div>
  <div class="footer">WebLinkScanner Admin Panel</div>
</div>

<script>
  const SUPABASE_URL        = "https://gcpqarrvkcizefszmyxi.supabase.co";
  const SUPABASE_SERVICE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdjcHFhcnJ2a2NpemVmc3pteXhpIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MTgwOTIyNiwiZXhwIjoyMDg3Mzg1MjI2fQ.7opGKn-G_CqP4hJXPZYROYp2rt0Bp9x-P5EWMnRGflc";

  const params  = new URLSearchParams(window.location.search);
  const userId  = params.get("user_id");
  const action  = params.get("action"); // "approve" or "reject"

  const headers = {
    "apikey":        SUPABASE_SERVICE_KEY,
    "Authorization": "Bearer " + SUPABASE_SERVICE_KEY,
    "Content-Type":  "application/json"
  };

  function showResult(icon, title, badgeText, badgeColor, body) {
    document.getElementById("header-sub").textContent = title;
    document.getElementById("content").innerHTML =
      "<div class='result'>" +
      "<div class='icon'>" + icon + "</div>" +
      "<h1>" + title + "</h1>" +
      "<div class='badge' style='background:" + badgeColor + "20;color:" + badgeColor + "'>" + badgeText + "</div>" +
      "<p>" + body + "</p>" +
      "</div>";
  }

  async function applyAction(userId, action, user) {
    const newStatus = action === "approve" ? "approved" : "rejected";
    const res = await fetch(
      SUPABASE_URL + "/rest/v1/users?id=eq." + userId,
      { method: "PATCH", headers: { ...headers, "Prefer": "return=minimal" },
        body: JSON.stringify({ status: newStatus }) }
    );
    const name  = user.name  || "Unknown";
    const email = user.email || "";
    const role  = (user.role || "user").replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
    if (!res.ok) {
      showResult("⚠️", "Update Failed", "Error", "#dc2626",
        "Could not update account status. Please try again.");
      return;
    }
    if (action === "approve") {
      showResult("✅", "Account Approved", "Approved", "#16a34a",
        "<b>" + name + "</b> (" + email + ") has been approved as <b>" + role + "</b>.<br><br>They can now log in to WebLinkScanner.");
    } else {
      showResult("❌", "Account Rejected", "Rejected", "#dc2626",
        "<b>" + name + "</b> (" + email + ") has been rejected.<br><br>They will see a rejection message when they attempt to log in.");
    }
  }

  async function loadUser() {
    if (!userId) {
      showResult("❓", "Invalid Link", "Error", "#dc2626", "No user ID provided in this link.");
      return;
    }
    const res = await fetch(
      SUPABASE_URL + "/rest/v1/users?id=eq." + userId + "&select=name,email,role,status",
      { headers }
    );
    const data = await res.json();
    const user = data && data[0];
    if (!user) {
      showResult("❓", "User Not Found", "Error", "#dc2626",
        "No account was found with this ID. It may have been deleted.");
      return;
    }

    const name       = user.name  || "Unknown";
    const email      = user.email || "";
    const role       = (user.role || "user").replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
    const curStatus  = user.status || "approved";

    if (curStatus !== "pending") {
      const icon  = curStatus === "approved" ? "✅" : "❌";
      const color = curStatus === "approved" ? "#16a34a" : "#dc2626";
      showResult(icon, "Already " + curStatus.charAt(0).toUpperCase() + curStatus.slice(1),
        curStatus.charAt(0).toUpperCase() + curStatus.slice(1), color,
        "<b>" + name + "</b> (" + email + ") was already <b>" + curStatus + "</b>. No further action needed.");
      return;
    }

    if (action === "approve" || action === "reject") {
      await applyAction(userId, action, user);
      return;
    }

    // Show confirmation UI
    document.getElementById("content").innerHTML =
      "<div class='body'>" +
      "<p style='font-size:15px;color:#0f172a'>A new <strong>" + role + "</strong> account is awaiting your approval:</p>" +
      "<div class='info-box'>" +
      "<div class='info-row'><span class='info-label'>Name</span><span class='info-value'>" + name + "</span></div>" +
      "<div class='info-row'><span class='info-label'>Email</span><span class='info-value'>" + email + "</span></div>" +
      "<div class='info-row'><span class='info-label'>Role</span><span class='info-value role'>" + role + "</span></div>" +
      "</div>" +
      "<div class='btn-row'>" +
      "<button class='btn btn-approve' onclick='doAction(\"approve\")'>&#10003; Approve</button>" +
      "<button class='btn btn-reject'  onclick='doAction(\"reject\")'>&#10007; Reject</button>" +
      "</div></div>";

    window._approvalUser = user;
  }

  async function doAction(act) {
    document.querySelectorAll(".btn").forEach(b => b.disabled = true);
    await applyAction(userId, act, window._approvalUser);
  }

  loadUser();
</script>
</body>
</html>
