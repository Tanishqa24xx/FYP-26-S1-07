<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — LinkScanner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #EFF6FF 0%, #F8FAFC 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 40px 36px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        }

        .logo {
            text-align: center;
            margin-bottom: 8px;
        }

        .logo-box {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            background: radial-gradient(circle, #DBEAFE, #EFF6FF);
            border-radius: 16px;
            font-size: 32px;
            margin-bottom: 12px;
        }

        .title {
            font-size: 26px;
            font-weight: 700;
            color: #2563EB;
            text-align: center;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 14px;
            color: #64748B;
            text-align: center;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #0F172A;
            margin-bottom: 6px;
        }

        .input-wrap {
            position: relative;
        }

        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 12px 44px 12px 14px;
            border: 1.5px solid #CBD5E1;
            border-radius: 12px;
            font-size: 15px;
            color: #0F172A;
            outline: none;
            transition: border-color 0.2s;
            background: white;
        }

        input:focus {
            border-color: #2563EB;
        }

        input.error {
            border-color: #DC2626;
        }

        .toggle-pw {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #64748B;
            font-size: 18px;
            user-select: none;
        }

        .error-msg {
            font-size: 12px;
            color: #DC2626;
            margin-top: 4px;
            display: none;
        }

        .error-msg.show {
            display: block;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: #2563EB;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            background: #1D4ED8;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            background: #93C5FD;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2.5px solid rgba(255, 255, 255, 0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Success state */
        .success-box {
            display: none;
            text-align: center;
            padding: 16px 0;
        }

        .success-box .icon {
            font-size: 52px;
            margin-bottom: 16px;
        }

        .success-box h2 {
            font-size: 22px;
            font-weight: 700;
            color: #16A34A;
            margin-bottom: 8px;
        }

        .success-box p {
            font-size: 14px;
            color: #64748B;
            margin-bottom: 24px;
        }

        .btn-outline {
            width: 100%;
            padding: 13px;
            background: transparent;
            color: #2563EB;
            border: 1.5px solid #2563EB;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-outline:hover {
            background: #EFF6FF;
        }

        /* Error page */
        .error-box {
            display: none;
            text-align: center;
            padding: 16px 0;
        }

        .error-box .icon {
            font-size: 52px;
            margin-bottom: 16px;
        }

        .error-box h2 {
            font-size: 22px;
            font-weight: 700;
            color: #DC2626;
            margin-bottom: 8px;
        }

        .error-box p {
            font-size: 14px;
            color: #64748B;
        }

        .global-error {
            background: #FEF2F2;
            border: 1px solid #FECACA;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 13px;
            color: #DC2626;
            text-align: center;
            margin-top: 12px;
            display: none;
        }

        .global-error.show {
            display: block;
        }
    </style>
</head>

<body>
    <div class="card">

        <!-- Logo -->
        <div class="logo">
            <div class="logo-box">🔗</div>
        </div>
        <div class="title">LinkScanner</div>
        <div class="subtitle">Set your new password</div>

        <!-- Reset Form -->
        <div id="formSection">
            <div class="form-group">
                <label for="newPassword">New Password</label>
                <div class="input-wrap">
                    <input type="password" id="newPassword" placeholder="Min. 6 characters" />
                    <span class="toggle-pw" onclick="toggleVisibility('newPassword', this)">👁</span>
                </div>
                <div class="error-msg" id="newPasswordError"></div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm New Password</label>
                <div class="input-wrap">
                    <input type="password" id="confirmPassword" placeholder="Re-enter your password" />
                    <span class="toggle-pw" onclick="toggleVisibility('confirmPassword', this)">👁</span>
                </div>
                <div class="error-msg" id="confirmPasswordError"></div>
            </div>

            <button class="btn" id="submitBtn" onclick="handleReset()">
                <div class="spinner" id="spinner"></div>
                <span id="btnText">Reset Password</span>
            </button>

            <div class="global-error" id="globalError"></div>
        </div>

        <!-- Success State -->
        <div class="success-box" id="successSection">
            <div class="icon">✅</div>
            <h2>Password Updated!</h2>
            <p>Your password has been reset successfully. You can now log in to the LinkScanner app with your new
                password.</p>
            <button class="btn-outline" onclick="window.close()">Close this page</button>
        </div>

        <!-- Error State (invalid/expired token) -->
        <div class="error-box" id="errorSection">
            <div class="icon">⚠️</div>
            <h2>Link Expired</h2>
            <p>This password reset link is invalid or has expired. Please request a new one from the app.</p>
        </div>

    </div>

    <script>
        // ── Extract token from URL ──────────────────────────────────────────────
        // Supabase puts the token in the URL hash: #access_token=xxx&type=recovery
        const hash = window.location.hash.substring(1)
        const params = new URLSearchParams(hash)
        const accessToken = params.get('access_token')
        const tokenType = params.get('type')

        // Also check query params as fallback
        const queryParams = new URLSearchParams(window.location.search)
        const queryToken = queryParams.get('access_token')

        const token = accessToken || queryToken

        // If no token or wrong type, show error section
        if (!token || (tokenType && tokenType !== 'recovery')) {
            document.getElementById('formSection').style.display = 'none'
            document.getElementById('errorSection').style.display = 'block'
        }

        // ── Toggle password visibility ─────────────────────────────────────────
        function toggleVisibility(inputId, icon) {
            const input = document.getElementById(inputId)
            if (input.type === 'password') {
                input.type = 'text'
                icon.textContent = '🙈'
            } else {
                input.type = 'password'
                icon.textContent = '👁'
            }
        }

        // ── Validate ───────────────────────────────────────────────────────────
        function validate(newPw, confirmPw) {
            let valid = true

            const newPwError = document.getElementById('newPasswordError')
            const confirmPwError = document.getElementById('confirmPasswordError')
            const newPwInput = document.getElementById('newPassword')
            const confirmPwInput = document.getElementById('confirmPassword')

            // Reset
            newPwError.classList.remove('show')
            confirmPwError.classList.remove('show')
            newPwInput.classList.remove('error')
            confirmPwInput.classList.remove('error')

            if (newPw.length < 6) {
                newPwError.textContent = 'Password must be at least 6 characters'
                newPwError.classList.add('show')
                newPwInput.classList.add('error')
                valid = false
            }

            if (confirmPw !== newPw) {
                confirmPwError.textContent = 'Passwords do not match'
                confirmPwError.classList.add('show')
                confirmPwInput.classList.add('error')
                valid = false
            }

            return valid
        }

        // ── Handle Reset ───────────────────────────────────────────────────────
        async function handleReset() {
            const newPw = document.getElementById('newPassword').value
            const confirmPw = document.getElementById('confirmPassword').value
            const globalError = document.getElementById('globalError')

            globalError.classList.remove('show')

            if (!validate(newPw, confirmPw)) return

            // Show loading
            const btn = document.getElementById('submitBtn')
            const spinner = document.getElementById('spinner')
            const btnText = document.getElementById('btnText')
            btn.disabled = true
            spinner.style.display = 'block'
            btnText.textContent = 'Updating...'

            try {
                const response = await fetch('/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        access_token: token,
                        new_password: newPw
                    })
                })

                const data = await response.json()

                if (response.ok) {
                    // Show success
                    document.getElementById('formSection').style.display = 'none'
                    document.getElementById('successSection').style.display = 'block'
                } else {
                    globalError.textContent = data.detail || 'Something went wrong. Please try again.'
                    globalError.classList.add('show')
                    btn.disabled = false
                    spinner.style.display = 'none'
                    btnText.textContent = 'Reset Password'
                }
            } catch (err) {
                globalError.textContent = 'Network error. Please check your connection.'
                globalError.classList.add('show')
                btn.disabled = false
                spinner.style.display = 'none'
                btnText.textContent = 'Reset Password'
            }
        }
    </script>
</body>

</html>
