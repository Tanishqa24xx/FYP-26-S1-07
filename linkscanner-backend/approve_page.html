<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LinkScanner - Account Approval</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 0;
      max-width: 480px;
      width: 90%;
      overflow: hidden;
      text-align: center;
    }
    .header {
      background: #1d4ed8;
      color: #fff;
      padding: 28px 32px;
    }
    .header .logo { font-size: 28px; font-weight: 800; margin-bottom: 4px; }
    .header .sub  { font-size: 14px; opacity: 0.85; }
    .body { padding: 32px; }
    .info-box {
      background: #f8fafc;
      border-radius: 12px;
      padding: 20px;
      margin: 20px 0;
      text-align: left;
    }
    .info-row { display: flex; padding: 8px 0; border-bottom: 1px solid #e2e8f0; }
    .info-row:last-child { border-bottom: none; }
    .info-label { width: 80px; color: #64748b; font-size: 14px; }
    .info-value { font-weight: 600; font-size: 14px; color: #0f172a; }
    .info-value.role { color: #1d4ed8; }
    .btn-row { display: flex; gap: 12px; margin-top: 24px; }
    .btn {
      flex: 1;
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.88; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-approve { background: #16a34a; color: #fff; }
    .btn-reject  { background: #dc2626; color: #fff; }

    /* Result card */
    .result { padding: 40px 32px; }
    .result .icon { font-size: 52px; margin-bottom: 16px; }
    .result h1 { font-size: 22px; color: #0f172a; margin-bottom: 10px; }
    .result p  { font-size: 15px; color: #64748b; line-height: 1.6; }
    .badge {
      display: inline-block;
      border-radius: 8px;
      padding: 4px 14px;
      font-size: 13px;
      font-weight: 600;
      margin: 12px 0;
    }

    /* Spinner */
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #e2e8f0;
      border-top-color: #1d4ed8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer { padding: 16px; font-size: 12px; color: #94a3b8; background: #f8fafc; }
    #loading { padding: 40px 32px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="logo">&#128279; LinkScanner</div>
      <div class="sub" id="header-sub">Admin Approval Required</div>
    </div>

    <!-- Loading state -->
    <div id="loading">
      <div class="spinner"></div>
      <p style="color:#64748b">Loading account details...</p>
    </div>

    <!-- Approval form (shown after loading user info) -->
    <div id="approval-form" style="display:none">
      <div class="body">
        <p style="font-size:15px;color:#0f172a">
          A new <strong id="role-label">account</strong> is awaiting your approval:
        </p>
        <div class="info-box">
          <div class="info-row">
            <span class="info-label">Name</span>
            <span class="info-value" id="user-name">-</span>
          </div>
          <div class="info-row">
            <span class="info-label">Email</span>
            <span class="info-value" id="user-email">-</span>
          </div>
          <div class="info-row">
            <span class="info-label">Role</span>
            <span class="info-value role" id="user-role">-</span>
          </div>
        </div>
        <div class="btn-row">
          <button class="btn btn-approve" id="btn-approve" onclick="doAction('approve')">
            &#10003; Approve
          </button>
          <button class="btn btn-reject" id="btn-reject" onclick="doAction('reject')">
            &#10007; Reject
          </button>
        </div>
      </div>
    </div>

    <!-- Result state -->
    <div id="result" style="display:none" class="result">
      <div class="icon" id="result-icon"></div>
      <h1 id="result-title"></h1>
      <div class="badge" id="result-badge"></div>
      <p id="result-body"></p>
    </div>

    <div class="footer" id="footer-note">
      &#10003; These links work without the server running &mdash; hosted on Supabase.
    </div>
  </div>

  <script>
    const SUPABASE_URL  = 'https://gcpqarrvkcizefszmyxi.supabase.co'
    const SERVICE_KEY   = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdjcHFhcnJ2a2NpemVmc3pteXhpIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MTgwOTIyNiwiZXhwIjoyMDg3Mzg1MjI2fQ.7opGKn-G_CqP4hJXPZYROYp2rt0Bp9x-P5EWMnRGflc'

    const params  = new URLSearchParams(window.location.search)
    const userId  = params.get('user_id')
    const action  = params.get('action')   // 'approve' | 'reject' | null

    const headers = {
      'Authorization': `Bearer ${SERVICE_KEY}`,
      'apikey': SERVICE_KEY,
      'Content-Type': 'application/json'
    }

    function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : '' }

    function showResult(icon, title, badgeText, badgeColor, bodyHtml) {
      document.getElementById('loading').style.display       = 'none'
      document.getElementById('approval-form').style.display = 'none'
      document.getElementById('result').style.display        = 'block'
      document.getElementById('result-icon').innerHTML  = icon
      document.getElementById('result-title').textContent = title
      document.getElementById('result-body').innerHTML   = bodyHtml
      const badge = document.getElementById('result-badge')
      badge.textContent = badgeText
      badge.style.background = badgeColor + '20'
      badge.style.color      = badgeColor
      document.getElementById('header-sub').textContent =
        title.includes('Approved') ? 'Account Approved' :
        title.includes('Rejected') ? 'Account Rejected' : title
    }

    let currentUser = null

    async function init() {
      if (!userId) {
        showResult('&#x26A0;', 'Invalid Link', 'Error', '#f59e0b',
          'This link is missing the user ID. Please check the email.')
        return
      }

      try {
        const res   = await fetch(
          `${SUPABASE_URL}/rest/v1/users?id=eq.${userId}&select=name,email,role,status`,
          { headers }
        )
        const users = await res.json()

        if (!users || users.length === 0) {
          showResult('&#x2753;', 'User Not Found', 'Error', '#dc2626',
            'No account was found with this ID. It may have been deleted.')
          return
        }

        currentUser = users[0]
        const roleLabel = (currentUser.role || 'user').replace(/_/g, ' ')
          .replace(/\b\w/g, c => c.toUpperCase())

        // Already actioned?
        if (currentUser.status !== 'pending') {
          const isApproved = currentUser.status === 'approved'
          showResult(
            isApproved ? '&#x2705;' : '&#x274C;',
            `Already ${cap(currentUser.status)}`,
            cap(currentUser.status),
            isApproved ? '#16a34a' : '#dc2626',
            `<b>${currentUser.name}</b> (${currentUser.email}) was already
             <b>${currentUser.status}</b>. No further action needed.`
          )
          return
        }

        // If action came from the email link — auto-execute it
        if (action === 'approve' || action === 'reject') {
          await doAction(action)
          return
        }

        // No action in URL — show the form so the developer can choose
        document.getElementById('loading').style.display       = 'none'
        document.getElementById('approval-form').style.display = 'block'
        document.getElementById('user-name').textContent  = currentUser.name  || '-'
        document.getElementById('user-email').textContent = currentUser.email || '-'
        document.getElementById('user-role').textContent  = roleLabel
        document.getElementById('role-label').textContent = roleLabel

      } catch (e) {
        showResult('&#x26A0;', 'Network Error', 'Error', '#dc2626',
          `Could not load account details.<br><small style="color:#94a3b8">${e.message}</small>`)
      }
    }

    async function doAction(act) {
      // Disable buttons to prevent double-click
      const btnA = document.getElementById('btn-approve')
      const btnR = document.getElementById('btn-reject')
      if (btnA) { btnA.disabled = true; btnR.disabled = true }

      // Show spinner while processing
      document.getElementById('loading').style.display       = 'block'
      document.getElementById('approval-form').style.display = 'none'

      const newStatus = act === 'approve' ? 'approved' : 'rejected'
      try {
        const patchRes = await fetch(
          `${SUPABASE_URL}/rest/v1/users?id=eq.${userId}`,
          {
            method: 'PATCH',
            headers: { ...headers, 'Prefer': 'return=minimal' },
            body: JSON.stringify({ status: newStatus })
          }
        )

        if (patchRes.ok || patchRes.status === 204) {
          const user      = currentUser
          const roleLabel = (user.role || 'user').replace(/_/g, ' ')
            .replace(/\b\w/g, c => c.toUpperCase())
          const isApprove = act === 'approve'
          const msg = isApprove
            ? `<b>${user.name}</b> (${user.email}) has been approved as <b>${roleLabel}</b>.<br><br>They can now log in to LinkScanner.`
            : `<b>${user.name}</b> (${user.email}) has been rejected.<br><br>They will see a rejection message when they attempt to log in.`
          showResult(
            isApprove ? '&#x2705;' : '&#x274C;',
            `Account ${isApprove ? 'Approved' : 'Rejected'}`,
            isApprove ? 'Approved' : 'Rejected',
            isApprove ? '#16a34a' : '#dc2626',
            msg
          )
        } else {
          const errText = await patchRes.text()
          showResult('&#x26A0;', 'Update Failed', 'Error', '#dc2626',
            `Could not update the account status.<br><small style="color:#94a3b8;font-size:12px">${errText}</small>`)
        }
      } catch (e) {
        showResult('&#x26A0;', 'Network Error', 'Error', '#dc2626',
          `Could not connect.<br><small style="color:#94a3b8;font-size:12px">${e.message}</small>`)
      }
    }

    init()
  </script>
</body>
</html>
